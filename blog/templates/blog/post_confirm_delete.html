{% extends 'base.html' %}

{% block title %}Удаление {{ object.title }}{% endblock %}

{% block content %}
    <div class="card">
        <div class="card-header bg-danger text-white">
            <h2>Подтверждение удаления</h2>
        </div>
        <div class="card-body">
            <p>Вы уверены, что хотите удалить статью "{{ object.title }}"?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Удалить</button>
                <a href="{% url 'blog:post_detail' object.pk %}" class="btn btn-secondary">Отмена</a>
            </form>
        </div>
    </div>
{% endblock %}
