{% extends 'catalog/base.html' %}
{% load my_tags %}
{% block content %}
<div class="album py-5 bg-body-tertiary">
        <div class="container">
          <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
            <div class="col mx-auto p-2">
              <div class="card shadow-sm">
                <img src='{{ product.photo | media_filter }}'>

                <div class="card-body">
                  <p class="card-text">{{ object.name }}.</p>
                  <p class="card-text">Описание: {{ object.description | truncatechars:100 }}.</p>
                  <p class="card-text">Категория: {{ object.category }}.</p>
                  <p class="card-text">Цена: {{ object.price }} руб.</p>
                  <p class="card-text">{{ object.created_at | date:"d M Y"}}.</p>
                  <div class="d-flex justify-content-between align-items-center">
                    <div class="btn-group">
                      <button type="button" class="btn btn-sm btn-outline-secondary">Купить</button>
                    </div>
                    <small class="text-body-secondary">9 mins</small>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
{% endblock %}
