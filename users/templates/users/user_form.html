{% extends 'catalog/base.html' %}

{% block content %}
    <div class="card">

        <div class="card-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">
                    Зарегистрироваться
                </button>
                <a href="{% url 'catalog:product_list' %}"
                   class="btn btn-secondary">Отмена</a>
            </form>
        </div>
    </div>
{% endblock %}
